name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    environment: release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure login
        shell: pwsh
        run: az account show

      - name: Prepare signing dlib and metadata
        shell: pwsh
        env:
          SIGN_ENDPOINT: ${{ vars.AZURE_SIGN_ENDPOINT }}
          SIGN_ACCOUNT: ${{ vars.AZURE_SIGN_ACCOUNT }}
          SIGN_PROFILE: ${{ vars.AZURE_SIGN_PROFILE }}
        run: |
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 `
            -OutputDirectory "$env:RUNNER_TEMP\signing" -ExcludeVersion
          $dlib = "$env:RUNNER_TEMP\signing\Microsoft.Trusted.Signing.Client\bin\x64\Azure.CodeSigning.Dlib.dll"
          $metadata = "$env:GITHUB_WORKSPACE\src-tauri\artifact-signing-metadata.json"
          [pscustomobject]@{
            Endpoint               = $env:SIGN_ENDPOINT
            CodeSigningAccountName = $env:SIGN_ACCOUNT
            CertificateProfileName = $env:SIGN_PROFILE
            ExcludeCredentials     = @(
              "EnvironmentCredential",
              "WorkloadIdentityCredential",
              "ManagedIdentityCredential",
              "SharedTokenCacheCredential",
              "VisualStudioCredential",
              "VisualStudioCodeCredential",
              "AzurePowerShellCredential",
              "AzureDeveloperCliCredential",
              "InteractiveBrowserCredential"
            )
          } | ConvertTo-Json -Depth 5 | Out-File -FilePath $metadata -Encoding utf8
          "AZURE_SIGN_DLIB=$dlib"         | Out-File $env:GITHUB_ENV -Append
          "AZURE_SIGN_METADATA=$metadata" | Out-File $env:GITHUB_ENV -Append

      - name: Probe signing
        shell: pwsh
        working-directory: src-tauri
        run: |
          $probe = "$env:RUNNER_TEMP\probe.exe"
          Copy-Item "$env:WINDIR\System32\WindowsPowerShell\v1.0\powershell.exe" $probe -Force
          powershell -NoProfile -ExecutionPolicy Bypass -File ../scripts/sign.ps1 $probe
          "signtool exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - run: npm run build
      - run: npm test
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BaselineLens ${{ github.ref_name }}"
          releaseDraft: true
