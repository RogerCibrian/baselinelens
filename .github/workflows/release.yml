name: release

on:
  push:
    tags: ["[0-9]*"]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    environment: release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $lines = Get-Content CHANGELOG.md
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[$([regex]::Escape($version))\]") { $start = $i; break }
          }
          if ($start -lt 0 -and $version -notmatch '-') { throw "No CHANGELOG.md section found for $version" }
          $body = @()
          if ($start -ge 0) {
            for ($i = $start + 1; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^## ' -or $lines[$i] -match '^\[[^\]]+\]:') { break }
              $body += $lines[$i]
            }
          } else {
            Write-Warning "No CHANGELOG section for prerelease $version; release body left empty."
          }
          $text = ($body -join "`n").Trim()
          "body<<__NOTES_EOF__`n$text`n__NOTES_EOF__" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure login
        shell: pwsh
        run: az account show

      - name: Prepare signing dlib and metadata
        shell: pwsh
        env:
          SIGN_ENDPOINT: ${{ vars.AZURE_SIGN_ENDPOINT }}
          SIGN_ACCOUNT: ${{ vars.AZURE_SIGN_ACCOUNT }}
          SIGN_PROFILE: ${{ vars.AZURE_SIGN_PROFILE }}
        run: |
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 `
            -OutputDirectory "$env:RUNNER_TEMP\signing" -ExcludeVersion
          $dlib = "$env:RUNNER_TEMP\signing\Microsoft.Trusted.Signing.Client\bin\x64\Azure.CodeSigning.Dlib.dll"
          $metadata = "$env:GITHUB_WORKSPACE\src-tauri\artifact-signing-metadata.json"
          [pscustomobject]@{
            Endpoint               = $env:SIGN_ENDPOINT
            CodeSigningAccountName = $env:SIGN_ACCOUNT
            CertificateProfileName = $env:SIGN_PROFILE
            ExcludeCredentials     = @(
              "EnvironmentCredential",
              "WorkloadIdentityCredential",
              "ManagedIdentityCredential",
              "SharedTokenCacheCredential",
              "VisualStudioCredential",
              "VisualStudioCodeCredential",
              "AzurePowerShellCredential",
              "AzureDeveloperCliCredential",
              "InteractiveBrowserCredential"
            )
          } | ConvertTo-Json -Depth 5 | Out-File -FilePath $metadata -Encoding utf8
          "AZURE_SIGN_DLIB=$dlib"         | Out-File $env:GITHUB_ENV -Append
          "AZURE_SIGN_METADATA=$metadata" | Out-File $env:GITHUB_ENV -Append

      - name: Probe signing (diagnostic)
        shell: pwsh
        run: |
          Write-Output "AZURE_SIGN_DLIB=$env:AZURE_SIGN_DLIB (exists: $(Test-Path $env:AZURE_SIGN_DLIB))"
          Write-Output "AZURE_SIGN_METADATA=$env:AZURE_SIGN_METADATA (exists: $(Test-Path $env:AZURE_SIGN_METADATA))"
          $onPath = Get-Command signtool.exe -ErrorAction SilentlyContinue
          Write-Output "signtool on PATH: $($onPath.Source)"
          Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Output "SDK signtool: $($_.FullName)" }
          $probe = Join-Path $env:RUNNER_TEMP 'probe.exe'
          Copy-Item "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" $probe -Force
          Write-Output "--- running scripts/sign.ps1 on the probe ---"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/sign.ps1 $probe
          Write-Output "--- sign.ps1 exit code: $LASTEXITCODE ---"
          if ($LASTEXITCODE -ne 0) { throw "sign.ps1 failed with exit code $LASTEXITCODE" }

      - run: npm run build
      - run: npm test
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BaselineLens ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
