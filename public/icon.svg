<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BaselineLens">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6260c4"/>
      <stop offset="1" stop-color="#413e93"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#241f3b" stop-opacity="0"/>
      <stop offset="1" stop-color="#241f3b" stop-opacity="0.16"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#e9e9f5"/>
      <stop offset="1" stop-color="#c2c1da"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f4fb"/>
      <stop offset="1" stop-color="#c8c7de"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.36" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#241f3b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#tile)"/>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#sheen)"/>

  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="18" y1="106" x2="56" y2="106" stroke-width="6" stroke-opacity="0.8"/>
    <line x1="176" y1="106" x2="238" y2="106" stroke-width="6" stroke-opacity="0.8"/>
  </g>

  <g filter="url(#lift)">
    <line x1="160" y1="150" x2="198" y2="188" stroke="url(#handle)" stroke-width="24" stroke-linecap="round"/>
    <circle cx="116" cy="106" r="56" fill="none" stroke="url(#bezel)" stroke-width="14"/>
    <circle cx="116" cy="106" r="49" fill="url(#glass)"/>
  </g>

  <line x1="156" y1="146" x2="194" y2="184" stroke="#ffffff" stroke-width="5" stroke-opacity="0.5" stroke-linecap="round"/>

  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <line x1="60" y1="106" x2="172" y2="106" stroke-width="11"/>
    <g stroke-width="6">
      <line x1="74" y1="94" x2="74" y2="118"/>
      <line x1="92" y1="99" x2="92" y2="113"/>
      <line x1="110" y1="94" x2="110" y2="118"/>
      <line x1="128" y1="99" x2="128" y2="113"/>
      <line x1="146" y1="94" x2="146" y2="118"/>
      <line x1="164" y1="99" x2="164" y2="113"/>
    </g>
  </g>

  <circle cx="116" cy="106" r="47" fill="none" stroke="#241f3b" stroke-width="2" stroke-opacity="0.12"/>
  <path d="M152 131 A44 44 0 0 1 131 147" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.28" stroke-linecap="round"/>
  <ellipse cx="96" cy="78" rx="16" ry="8" fill="#ffffff" fill-opacity="0.22" transform="rotate(-35 96 78)"/>
  <path d="M80 78 A44 44 0 0 1 104 60" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.75" stroke-linecap="round"/>

  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#vignette)"/>
</svg>
