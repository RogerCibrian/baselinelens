<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NACT v2 — Document + Console</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="v2/tokens-v2.css" />

    <style>
      [data-v2-font="inter"]      { --v-font-sans: "Inter", system-ui, sans-serif; }
      [data-v2-font="ibm-plex"]   { --v-font-sans: "IBM Plex Sans", system-ui, sans-serif; }
      [data-v2-font="manrope"]    { --v-font-sans: "Manrope", system-ui, sans-serif; }
      [data-v2-font="public-sans"]{ --v-font-sans: "Public Sans", system-ui, sans-serif; }
      [data-v2-font="geist"]      { --v-font-sans: "Geist", system-ui, sans-serif; }
      [data-v2-font="segoe-variable"] { --v-font-sans: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif; }
      [data-v2-font="segoe"]      { --v-font-sans: "Segoe UI", "Segoe UI Variable", system-ui, sans-serif; }
      [data-v2-font="sf-pro"]     { --v-font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
      [data-v2-font="system"]     { --v-font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    </style>

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: var(--v-bg, #f7f7f5); font-family: var(--v-font-sans); color: var(--v-text); }
      #root { height: 100%; min-height: 100vh; }

      .v2-shell {
        min-height: 100vh;
        background: var(--v-bg);
        color: var(--v-text);
        display: flex;
        flex-direction: column;
      }
      .v2-topbar {
        position: sticky; top: 0; z-index: 50;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px;
        height: 48px;
        background: var(--v-paper);
        border-bottom: 1px solid var(--v-line);
      }
      .v2-brand {
        display: inline-flex; align-items: center; gap: 10px;
        font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
      }
      .v2-brand-mark {
        width: 18px; height: 18px;
        background: var(--v-accent);
        border-radius: 3px;
        display: inline-flex; align-items: center; justify-content: center;
        color: var(--v-accent-on);
        font-size: 11px;
        font-weight: 700;
        font-family: var(--v-font-mono);
      }
      .v2-brand small {
        font-weight: 400; color: var(--v-text-subtle); margin-left: 8px;
      }
      /* ── Tabs ─────────────────────────────────────────────────────────────────── */
      /* Flat-with-affordance: typographic, but reads as buttons.
         Inset panel, ▸ marker that rotates on active, hover tints. */
      .v2-tabs {
        display: inline-flex;
        gap: 4px;
        margin-left: 24px;
        align-items: center;
        background: var(--v-paper-2);
        border: 1px solid var(--v-line);
        border-radius: 6px;
        padding: 3px;
        height: 36px;
      }
      .v2-tab {
        height: 28px;
        padding: 0 16px;
        border: 0;
        background: transparent;
        color: var(--v-text-muted);
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 4px;
        display: inline-flex; align-items: center;
        transition: background 120ms ease, color 120ms ease;
      }
      .v2-tab:hover {
        background: var(--v-paper-3);
        color: var(--v-text);
      }
      .v2-tab[data-active="true"] {
        background: var(--v-paper);
        color: var(--v-text);
        font-weight: 600;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      .v2-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 9px;
        background: var(--v-paper-3);
        border: 1px solid var(--v-line);
        border-radius: 4px;
        font-size: 11px;
        color: var(--v-text-muted);
      }
      .v2-iconbtn {
        width: 28px; height: 28px; border-radius: 4px;
        background: var(--v-paper-3);
        border: 1px solid var(--v-line);
        color: var(--v-text-muted);
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer;
        font-size: 13px;
      }
      .v2-iconbtn:hover { background: var(--v-paper-2); color: var(--v-text); }
      .v2-rescan {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 0 12px;
        height: 28px;
        background: var(--v-accent);
        color: var(--v-accent-on);
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .v2-viewport { flex: 1; position: relative; overflow: auto; isolation: isolate; }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script type="text/babel" src="v2/tweaks-panel.jsx"></script>
    <script type="text/babel" src="v2/data-v2.jsx"></script>
    <script type="text/babel" src="v2/components-v2.jsx"></script>
    <script type="text/babel" src="v2/Overview.jsx"></script>
    <script type="text/babel" src="v2/Console.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-screen-label="App shell v2">
      const V2_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "variant": "utility",
        "theme": "light",
        "font": "segoe-variable"
      }/*EDITMODE-END*/;

      function V2AppShell() {
        const [tweaks, setTweak] = useTweaks(V2_TWEAK_DEFAULTS);
        const [tab, setTab] = React.useState('overview');
        const [detail, setDetail] = React.useState(null);
        const [consoleFilter, setConsoleFilter] = React.useState(null);
        const { data } = useV2Data();

        const jumpToConsole = React.useCallback((filter) => {
          setConsoleFilter({
            category: filter?.category ?? 'all',
            status: filter?.status ?? 'all',
            level: filter?.level ?? 'all',
            _nonce: Date.now(),
          });
          setTab('console');
        }, []);

        return (
          <div
            className="v2-shell v2-root"
            data-v2-theme={tweaks.theme}
            data-v2-variant={tweaks.variant}
            data-v2-font={tweaks.font}
            data-screen-label={tab === 'overview' ? '01 Overview' : '02 Console'}
          >
            <header className="v2-topbar">
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span className="v2-brand">
                  <span className="v2-brand-mark">N</span>
                  Not A Compliance Tool
                  {data && <small>{data.device.name}</small>}
                </span>

                <div className="v2-tabs" role="tablist">
                  <button className="v2-tab" role="tab" data-active={tab === 'overview'} onClick={() => setTab('overview')}>
                    Overview
                  </button>
                  <button className="v2-tab" role="tab" data-active={tab === 'console'} onClick={() => setTab('console')}>
                    Console
                  </button>
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                {data && (
                  <span className="v2-pill">
                    <span style={{ width: 6, height: 6, borderRadius: 3, background: 'var(--v-pass)' }} />
                    Managed · scanned {v2FormatRelative(data.device.last_scan)}
                  </span>
                )}
                <button className="v2-rescan">↻ Rescan</button>
                <button
                  className="v2-iconbtn"
                  onClick={() => setTweak('theme', tweaks.theme === 'dark' ? 'light' : 'dark')}
                  title={`Switch to ${tweaks.theme === 'dark' ? 'light' : 'dark'}`}
                >
                  {tweaks.theme === 'dark' ? '☀' : '☾'}
                </button>
              </div>
            </header>

            <div className="v2-viewport">
              {tab === 'overview' && <V2Overview openDetail={setDetail} jumpToConsole={jumpToConsole} />}
              {tab === 'console' && <V2Console openDetail={setDetail} initialFilter={consoleFilter} />}
            </div>

            <V2DetailDrawer rec={detail} onClose={() => setDetail(null)} />

            <TweaksPanel title="Tweaks" defaultPosition={{ right: 24, bottom: 24 }}>
              <TweakSection title="Color">
                <TweakRadio
                  label="Variant"
                  value={tweaks.variant}
                  onChange={(v) => setTweak('variant', v)}
                  options={[
                    { value: 'utility', label: 'Utility' },
                    { value: 'branded', label: 'Branded' },
                  ]}
                />
                <TweakRadio
                  label="Theme"
                  value={tweaks.theme}
                  onChange={(v) => setTweak('theme', v)}
                  options={[
                    { value: 'light', label: 'Light' },
                    { value: 'dark', label: 'Dark' },
                  ]}
                />
              </TweakSection>
              <TweakSection title="Typography">
                <TweakSelect
                  label="UI font"
                  value={tweaks.font}
                  onChange={(v) => setTweak('font', v)}
                  options={[
                    { value: 'inter', label: 'Inter' },
                    { value: 'ibm-plex', label: 'IBM Plex Sans' },
                    { value: 'manrope', label: 'Manrope' },
                    { value: 'public-sans', label: 'Public Sans' },
                    { value: 'geist', label: 'Geist' },
                    { value: 'segoe-variable', label: 'Segoe UI Variable (MS)' },
                    { value: 'segoe', label: 'Segoe UI (MS)' },
                    { value: 'sf-pro', label: 'SF Pro (matches v1)' },
                    { value: 'system', label: 'System default' },
                  ]}
                />
              </TweakSection>
            </TweaksPanel>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<V2AppShell />);
    </script>
  </body>
</html>
